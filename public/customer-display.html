<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pantalla de Cliente</title>
  <style>
    :root {
      --primary: #1e40af;
      --accent: #f59e0b;
      --bg: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      user-select: none;
    }

    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
    }

    .screen.active {
      opacity: 1;
      pointer-events: auto;
    }

    /* ========== IDLE ========== */

    #idle {
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 6vh 5vw;
      background: linear-gradient(135deg, var(--primary) 0%, color-mix(in srgb, var(--primary) 70%, black) 100%);
      color: #fff;
    }

    #idle .logo-wrap {
      width: 30vh;
      height: 30vh;
      max-width: 260px;
      max-height: 260px;
      border-radius: 50%;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 4vh;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      overflow: hidden;
    }

    #idle .logo-wrap img {
      width: 80%;
      height: 80%;
      object-fit: contain;
    }

    #idle .logo-fallback {
      font-size: 12vh;
      font-weight: 800;
      color: var(--primary);
    }

    #idle h1 {
      font-size: 7vh;
      font-weight: 700;
      margin-bottom: 1.5vh;
      letter-spacing: -0.02em;
    }

    #idle h2 {
      font-size: 4.5vh;
      font-weight: 500;
      opacity: 0.85;
    }

    #idle .subtitle {
      font-size: 2.8vh;
      margin-top: 3vh;
      opacity: 0.7;
      max-width: 80%;
    }

    /* ========== CART ========== */

    #cart {
      flex-direction: row;
    }

    #cart .left {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      border-right: 1px solid var(--border);
    }

    #cart .header {
      padding: 3vh 4vh 2vh;
      display: flex;
      align-items: center;
      gap: 2vh;
      border-bottom: 1px solid var(--border);
    }

    #cart .header .brand-logo {
      width: 8vh;
      height: 8vh;
      border-radius: 50%;
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 700;
      overflow: hidden;
      flex-shrink: 0;
    }

    #cart .header .brand-logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #cart .header .brand-name {
      font-size: 3vh;
      font-weight: 700;
    }

    #cart .header .cart-label {
      margin-left: auto;
      font-size: 2.2vh;
      color: var(--muted);
      font-weight: 500;
    }

    #cart .items {
      flex: 1;
      overflow-y: auto;
      padding: 1vh 0;
    }

    #cart .items::-webkit-scrollbar { width: 6px; }
    #cart .items::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    #cart .item {
      padding: 2vh 4vh;
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 2vh;
      align-items: center;
      border-bottom: 1px solid var(--border);
      animation: slideIn 0.25s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    #cart .item .name {
      font-size: 2.6vh;
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #cart .item .qty {
      font-size: 2.2vh;
      color: var(--muted);
      font-weight: 500;
      min-width: 14vh;
      text-align: right;
    }

    #cart .item .subtotal {
      font-size: 2.6vh;
      font-weight: 700;
      min-width: 14vh;
      text-align: right;
    }

    #cart .empty {
      padding: 8vh 4vh;
      text-align: center;
      color: var(--muted);
      font-size: 2.5vh;
    }

    #cart .right {
      width: 40%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 3vh 4vh;
      background: #f8fafc;
    }

    #cart .summary .row {
      display: flex;
      justify-content: space-between;
      padding: 1.5vh 0;
      font-size: 2.5vh;
    }

    #cart .summary .row.muted {
      color: var(--muted);
      font-size: 2.2vh;
    }

    #cart .summary .divider {
      height: 1px;
      background: var(--border);
      margin: 1.5vh 0;
    }

    #cart .total-box {
      background: var(--primary);
      color: #fff;
      border-radius: 2vh;
      padding: 3vh 3.5vh;
      text-align: center;
      box-shadow: 0 10px 30px color-mix(in srgb, var(--primary) 40%, transparent);
    }

    #cart .total-box .label {
      font-size: 2.5vh;
      opacity: 0.85;
      margin-bottom: 0.5vh;
    }

    #cart .total-box .amount {
      font-size: 8vh;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    /* ========== COMPLETED ========== */

    #completed {
      justify-content: center;
      align-items: center;
      text-align: center;
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: #fff;
      padding: 5vh;
    }

    #completed .check {
      width: 22vh;
      height: 22vh;
      border-radius: 50%;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 4vh;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      animation: pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes pop {
      0% { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    #completed .check svg {
      width: 50%;
      height: 50%;
      color: #10b981;
    }

    #completed h1 {
      font-size: 9vh;
      font-weight: 800;
      margin-bottom: 2vh;
      letter-spacing: -0.02em;
    }

    #completed .message {
      font-size: 4vh;
      font-weight: 500;
      opacity: 0.95;
      margin-bottom: 4vh;
    }

    #completed .total-amount {
      font-size: 6vh;
      font-weight: 700;
      background: rgba(255, 255, 255, 0.15);
      padding: 2vh 5vh;
      border-radius: 2vh;
      margin-bottom: 2vh;
    }

    #completed .invoice-number {
      font-size: 2.5vh;
      opacity: 0.8;
    }
  </style>
</head>
<body>

  <!-- Pantalla IDLE (bienvenida) -->
  <div id="idle" class="screen active">
    <div class="logo-wrap">
      <img id="idle-logo" src="" alt="" style="display: none;">
      <div id="idle-logo-fallback" class="logo-fallback">★</div>
    </div>
    <h1 id="idle-company">Bienvenido</h1>
    <h2 id="idle-greeting">¡Gracias por su visita!</h2>
    <p class="subtitle">Realice su pedido y nuestro personal lo atenderá</p>
  </div>

  <!-- Pantalla CART (carrito) -->
  <div id="cart" class="screen">
    <div class="left">
      <div class="header">
        <div class="brand-logo">
          <img id="cart-logo" src="" alt="" style="display: none;">
          <span id="cart-logo-fallback">★</span>
        </div>
        <div class="brand-name" id="cart-company">Mi negocio</div>
        <div class="cart-label">Detalle de su compra</div>
      </div>
      <div class="items" id="cart-items">
        <div class="empty">Agregando productos...</div>
      </div>
    </div>
    <div class="right">
      <div class="summary">
        <div class="row muted"><span>Subtotal</span><span id="sum-subtotal">S/ 0.00</span></div>
        <div class="row muted" id="sum-discount-row" style="display: none;"><span>Descuento</span><span id="sum-discount">- S/ 0.00</span></div>
        <div class="row muted"><span>IGV (18%)</span><span id="sum-igv">S/ 0.00</span></div>
      </div>
      <div class="total-box">
        <div class="label">Total a pagar</div>
        <div class="amount" id="sum-total">S/ 0.00</div>
      </div>
    </div>
  </div>

  <!-- Pantalla COMPLETED (venta confirmada) -->
  <div id="completed" class="screen">
    <div class="check">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    </div>
    <h1>¡Gracias!</h1>
    <div class="message">Su compra fue registrada con éxito</div>
    <div class="total-amount" id="completed-total">S/ 0.00</div>
    <div class="invoice-number" id="completed-invoice"></div>
  </div>

  <script>
    (function () {
      const $ = (id) => document.getElementById(id);
      const screens = {
        idle: $('idle'),
        cart: $('cart'),
        completed: $('completed'),
      };

      let config = {
        primaryColor: '#1e40af',
        accentColor: '#f59e0b',
        companyName: '',
        logoUrl: '',
      };

      let completedTimer = null;

      const applyBranding = () => {
        document.documentElement.style.setProperty('--primary', config.primaryColor || '#1e40af');
        document.documentElement.style.setProperty('--accent', config.accentColor || '#f59e0b');

        const name = (config.companyName || '').trim();
        const initial = name ? name.trim().charAt(0).toUpperCase() : '★';

        if (name) {
          $('idle-company').textContent = name;
          $('idle-greeting').textContent = '¡Bienvenido!';
          $('cart-company').textContent = name;
        } else {
          $('idle-company').textContent = 'Bienvenido';
          $('cart-company').textContent = 'Mi negocio';
        }

        $('idle-logo-fallback').textContent = initial;
        $('cart-logo-fallback').textContent = initial;

        if (config.logoUrl) {
          const idleLogo = $('idle-logo');
          const cartLogo = $('cart-logo');
          idleLogo.onload = () => {
            idleLogo.style.display = 'block';
            $('idle-logo-fallback').style.display = 'none';
          };
          idleLogo.onerror = () => {
            idleLogo.style.display = 'none';
            $('idle-logo-fallback').style.display = 'block';
          };
          idleLogo.src = config.logoUrl;

          cartLogo.onload = () => {
            cartLogo.style.display = 'block';
            $('cart-logo-fallback').style.display = 'none';
          };
          cartLogo.onerror = () => {
            cartLogo.style.display = 'none';
            $('cart-logo-fallback').style.display = 'block';
          };
          cartLogo.src = config.logoUrl;
        }
      };

      const showScreen = (name) => {
        Object.keys(screens).forEach((key) => {
          screens[key].classList.toggle('active', key === name);
        });
      };

      const formatCurrency = (n) => {
        const value = Number(n || 0);
        return 'S/ ' + value.toLocaleString('es-PE', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      };

      const renderCart = (items, amounts) => {
        const container = $('cart-items');
        container.innerHTML = '';

        if (!items || items.length === 0) {
          container.innerHTML = '<div class="empty">Agregando productos...</div>';
        } else {
          items.forEach((item) => {
            const row = document.createElement('div');
            row.className = 'item';
            row.innerHTML =
              '<div class="name">' + escapeHtml(item.name || '') + '</div>' +
              '<div class="qty">' + (item.quantity || 0) + ' × ' + formatCurrency(item.price) + '</div>' +
              '<div class="subtotal">' + formatCurrency(item.subtotal) + '</div>';
            container.appendChild(row);
          });
        }

        $('sum-subtotal').textContent = formatCurrency(amounts.subtotal);
        $('sum-igv').textContent = formatCurrency(amounts.igv);
        $('sum-total').textContent = formatCurrency(amounts.total);

        if (amounts.discount && Number(amounts.discount) > 0) {
          $('sum-discount-row').style.display = 'flex';
          $('sum-discount').textContent = '- ' + formatCurrency(amounts.discount);
        } else {
          $('sum-discount-row').style.display = 'none';
        }
      };

      const escapeHtml = (s) => String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');

      // API expuesta al plugin nativo
      window.initDisplay = function (json) {
        try {
          config = Object.assign(config, JSON.parse(json));
          applyBranding();
          showScreen('idle');
        } catch (e) {
          console.error('initDisplay error:', e);
        }
      };

      window.updateDisplay = function (json) {
        try {
          const data = JSON.parse(json);
          const state = data.state || 'idle';

          // Cancelar timer anterior si había
          if (completedTimer) {
            clearTimeout(completedTimer);
            completedTimer = null;
          }

          if (state === 'idle') {
            showScreen('idle');
          } else if (state === 'cart') {
            let items = [];
            try {
              items = typeof data.items === 'string' ? JSON.parse(data.items) : (data.items || []);
            } catch { items = []; }
            renderCart(items, {
              subtotal: data.subtotal,
              igv: data.igv,
              discount: data.discount,
              total: data.total,
            });
            showScreen('cart');
          } else if (state === 'completed') {
            $('completed-total').textContent = formatCurrency(data.total);
            if (data.invoiceNumber) {
              $('completed-invoice').textContent = 'Comprobante: ' + data.invoiceNumber;
            } else {
              $('completed-invoice').textContent = '';
            }
            showScreen('completed');
            // Volver a idle automáticamente después de 6 segundos
            completedTimer = setTimeout(() => showScreen('idle'), 6000);
          }
        } catch (e) {
          console.error('updateDisplay error:', e);
        }
      };

      // Branding inicial por defecto
      applyBranding();
    })();
  </script>
</body>
</html>
